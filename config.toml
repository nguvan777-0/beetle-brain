# beetle-brain configuration
# edit anything here — restart the sim to apply
# inspired by the eyes of the Cambrian

[world]
width          = 700
height         = 700
food_count     = 100
max_pop        = 4096
n_start        = 12         # primordial soup
seed           = 42         # world seed — same seed → same vent layout
vent_count_min = 3
vent_count_max = 5
vent_radius    = 150.0      # food spawns within this radius; density ∝ 1/r²

[energy]
start       = 120.0
max         = 200.0
food        = 4.0       # energy per food item (flat — density does the work)
mouth_min        = 1.0   # tiny mouth — hard to eat
mouth_max        = 8.0   # huge mouth — filter feeder
energy_max_min   = 150.0 # lean — can't store much
energy_max_max   = 350.0 # fat — large reserves
pred_ratio_min   = 1.05  # can attack near-equal prey
pred_ratio_max   = 2.0   # only attacks much smaller prey
speed_scale_min  = 0.2   # brain has weak speed control
speed_scale_max  = 1.0   # brain has full speed control
breed_at_min  = 90.0    # r-strategists breed early and cheap
breed_at_max  = 180.0   # K-strategists wait and invest
clone_with_min = 25.0   # give offspring little (must be < breed_at_min)
clone_with_max = 85.0   # give offspring a lot

[traits]
# each trait is decoded from W_body via sigmoid into [min, max]
speed_min   = 0.3
speed_max   = 4.0
fov_min     = 0.47      # radians (~27 deg)
fov_max     = 2.83      # radians (~162 deg)
ray_min     = 30.0
ray_max     = 180.0
size_min    = 3.0
size_max    = 9.0

[brain]
n_rays      = 7         # number of vision rays
n_hidden    = 12        # hidden layer size (also h_state size)
n_outputs   = 2         # turn, speed

[evolution]
mutation_rate_min  = 0.01   # conservative mutators
mutation_rate_max  = 0.50   # hypermutators
mutation_scale_min = 0.02   # fine-grained changes
mutation_scale_max = 0.50   # wild leaps
epigenetic_min  = 0.0   # children start fresh (no memory inheritance)
epigenetic_max  = 1.0   # children inherit full parent brain state

[aging]
enabled          = true
weight_decay_min = 0.000005  # slow agers — live long, drift slowly
weight_decay_max = 0.0001    # fast agers — die young, mutate fast
                            # at decay=0.00002: ~86% remain after 8000 ticks
                            # lower = longer lived,  higher = faster aging

[camouflage]
enabled         = true
detect_bonus    = 9.0   # max extra predation radius for fully bright organism
                        # (scaled by brightness 0-1, added to size)

[metabolism]
drain_scale     = 0.015   # basal drain = drain_scale × size^0.75  (Kleiber's law)
size_tax        = 0.0003  # energy -= size² × size_tax per tick  (big = expensive)
speed_tax       = 0.004   # energy -= speed² × speed_tax per tick (fast = expensive)
age_tax         = 0.0005  # energy *= (1 - age_tax) per tick      (entropy / lifespan cap)
